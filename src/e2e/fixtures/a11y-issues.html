<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <!-- Problem: blokada powiekszania (zoom 1.4.4) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Fikstura problemow dostepnosci</title>
    <style>
      body { font-family: sans-serif; margin: 0; }
      /* Kontrast domyslny ~4.5:1 (przechodzi), na hover spada ponizej progu (contrast 1.4.3) */
      a.hovertest { color: #767676; background: #ffffff; }
      a.hovertest:hover { color: #cccccc; background: #ffffff; }
      /* Element wymuszajacy poziome przewijanie przy waskim viewporcie (reflow 1.4.10) */
      .wide { width: 1200px; height: 30px; background: #eeeeee; }
    </style>
  </head>
  <body>
    <!-- Przeskok poziomu naglowka h1 -> h3 (nvda 1.3.1) -->
    <h1>Strona testowa</h1>
    <h3>Podsekcja z przeskokiem</h3>

    <!-- Obraz bez alt (axe: image-alt) -->
    <img src="data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA=" width="20" height="20" />

    <!-- Pusty przycisk bez nazwy (axe: button-name; nvda: kontrolka bez nazwy) -->
    <button></button>

    <!-- Element klikalny nieosiagalny z klawiatury (keyboard 2.1.1) -->
    <div onclick="void 0" role="button">Kliknij mnie</div>

    <!-- Dodatnia wartosc tabindex (keyboard 2.4.3) -->
    <a href="#cel" tabindex="5">Link z dodatnim tabindex</a>

    <!-- Nieprawidlowa rola ARIA (aria 4.1.2) -->
    <div role="buton">Zla rola</div>

    <!-- Zepsuta referencja aria-labelledby (aria 1.3.1) -->
    <span aria-labelledby="nie-istnieje">Etykieta wskazuje na nieistniejace id</span>

    <!-- Element powodujacy poziome przepelnienie -->
    <div class="wide">Szeroki element 1200px</div>

    <!-- Link z pogorszeniem kontrastu na hover -->
    <a href="#" class="hovertest">Najedz na mnie</a>
  </body>
</html>
