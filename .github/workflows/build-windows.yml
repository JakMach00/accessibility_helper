name: Build Windows

# Builds the Windows binaries on a GitHub-hosted Windows runner. No local tooling
# is required - download the ready file from the Actions tab (Artifacts) or from
# Releases (for v* tags).
on:
  workflow_dispatch: {} # manual run from the Actions tab
  push:
    tags:
      - 'v*' # e.g. v2.0.0 - also creates a Release with downloadable files

permissions:
  contents: write # required to create a Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Skip the Playwright Chromium download - the .exe does not bundle it, and it
        # is not needed for the build itself (the app uses the system Edge/Chrome).
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Unit tests
        run: npm test

      - name: Build app and installers
        # Build only; the Release step below publishes the files. Passing
        # --publish never stops electron-builder from trying to publish itself
        # (which would require a GH_TOKEN).
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Upload artifacts (downloadable from the Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: wcag-auditor-windows
          path: |
            release/*.exe
          if-no-files-found: error

      - name: Create Release (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
