name: Build Windows

# Builds the Windows app on a GitHub-hosted Windows runner and publishes the whole
# ready-to-run app folder as a single .zip. No local tooling is required: download
# the .zip from Releases (for v* tags) or the Actions tab, extract it, and run
# "WCAG Auditor.exe" inside the extracted folder.
on:
  workflow_dispatch: {} # manual run from the Actions tab
  push:
    tags:
      - 'v*' # e.g. v2.1.0 - also creates a Release with the downloadable .zip

permissions:
  contents: write # required to create a Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Skip the Playwright Chromium download - the app does not bundle it, and it
        # is not needed for the build (the app uses the system Edge/Chrome).
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Unit tests
        run: npm test

      - name: Build the unpacked app
        # --dir produces the ready-to-run app folder (release/win-unpacked) without
        # installers. --publish never keeps electron-builder from trying to publish.
        run: |
          npm run build
          npx electron-builder --win --dir --publish never

      - name: Package the app folder into a .zip
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $src = "release\win-unpacked"
          if (-not (Test-Path $src)) { throw "Build output release/win-unpacked not found" }
          $name = "WCAG-Auditor-$version"
          Rename-Item $src $name
          Compress-Archive -Path "release\$name" -DestinationPath "release\$name.zip" -Force
          Write-Host "Created release\$name.zip"

      - name: Upload the .zip (downloadable from the Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: wcag-auditor-windows-zip
          path: release/*.zip
          if-no-files-found: error

      - name: Create Release (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
