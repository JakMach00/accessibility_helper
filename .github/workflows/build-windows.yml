name: Build Windows

# Builds the Windows app on a GitHub-hosted Windows runner and publishes it as a
# .zip. No local tooling is required - download the .zip from the Actions tab
# (Artifacts) or from Releases (for v* tags), extract it, and run the .exe inside.
on:
  workflow_dispatch: {} # manual run from the Actions tab
  push:
    tags:
      - 'v*' # e.g. v2.1.0 - also creates a Release with the downloadable .zip

permissions:
  contents: write # required to create a Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Skip the Playwright Chromium download - the app does not bundle it, and it
        # is not needed for the build itself (the app uses the system Edge/Chrome).
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Unit tests
        run: npm test

      - name: Build the portable app
        # --publish never stops electron-builder from trying to publish itself
        # (which would require a GH_TOKEN); the Release step below does the publishing.
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Package the portable .exe into a .zip
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $portable = Get-ChildItem release\*-portable.exe | Select-Object -First 1
          if (-not $portable) { throw "Portable .exe not found in release/" }
          $zip = "release\WCAG-Auditor-$version.zip"
          Compress-Archive -Path $portable.FullName -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Upload the .zip (downloadable from the Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: wcag-auditor-windows-zip
          path: release/*.zip
          if-no-files-found: error

      - name: Create Release (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
