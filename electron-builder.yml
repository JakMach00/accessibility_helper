appId: com.jakub.wcagauditor
productName: WCAG Auditor
copyright: Copyright © 2026 Jakub

# electron-vite builds into out/; here we only package the result.
directories:
  output: release
  buildResources: build

# Application files included in the package. Production dependencies (playwright,
# axe-core) are added automatically by electron-builder from node_modules.
files:
  - out/**/*
  - package.json

# Playwright launches browser processes, so its code is kept unpacked from asar.
asarUnpack:
  - "**/node_modules/playwright/**"
  - "**/node_modules/playwright-core/**"

win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  # Custom icon: uncomment after placing build/icon.ico (256x256).
  # icon: build/icon.ico

# Portable build: a single self-contained .exe, no installation.
portable:
  artifactName: WCAG-Auditor-${version}-portable.${ext}
  # Fixed extraction folder name in %TEMP% (faster subsequent start).
  unpackDirName: WCAGAuditorPortable

nsis:
  oneClick: false                          # classic wizard instead of one-click install
  perMachine: false                        # install for the current user (no admin rights)
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: WCAG Auditor
